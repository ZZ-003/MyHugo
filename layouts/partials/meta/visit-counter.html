<span id="{{ .File.UniqueID }}" title="{{ i18n "article.visit_title" }}">
  {{ "eye" | markdownify | emojify }}
</span>
<script>
var r = new XMLHttpRequest();
r.addEventListener('load', function() {
  document.getElementById('{{ .File.UniqueID }}').innerText =
    JSON.parse(this.responseText).count_unique + ' ' +
    {{ i18n "article.visit_name" }};
});
r.open('GET',
  'https://zde2cf.goatcounter.com/counter/' +
  encodeURIComponent({{ .RelPermalink }}.replace(/(\/)?$/, '')) +
  '.json'
);
r.send();
</script>
